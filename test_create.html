<!DOCTYPE html>
<html>
<body>

<button onclick="createPO()">
Create Test Purchase Order
</button>

<script>

function createPO() {

    console.log("BUTTON CLICKED");

    fetch('api/purchase_orders/create.php', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            supplier_id: 1,
            order_date: '2026-06-11',
            expected_date: '2026-06-15',
            items: [
                {
                    inventory_item_id: 3,
                    quantity: 10,
                    unit_price: 450
                }
            ]
        })
    })
    .then(response => {
        console.log("STATUS:", response.status);
        return response.text();
    })
    .then(data => {
        console.log("RAW RESPONSE:", data);
        alert(data);
    })
    .catch(error => {
        console.error("ERROR:", error);
        alert(error);
    });

}

</script>

</body>
</html>
